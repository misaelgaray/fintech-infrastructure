global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'spark-master'
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ['spark-master:8080']

  - job_name: 'spark-worker'
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ['spark-worker:8081']